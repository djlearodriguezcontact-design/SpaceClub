<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Sistema Boliche PRO</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: #0d0d0d;
  color: #eaeaea;
}

header {
  background: #121212;
  padding: 20px;
  text-align: center;
  border-bottom: 1px solid #222;
}

h1 {
  font-weight: 500;
}

.container { padding: 20px; }

.btn {
  background: #7b2cff;
  border: none;
  padding: 10px 15px;
  color: white;
  cursor: pointer;
  border-radius: 8px;
}

input {
  padding: 10px;
  border-radius: 8px;
  border: none;
  margin: 5px 0;
  width: 100%;
}

.grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
  gap: 15px;
}

.card {
  background: #161616;
  padding: 15px;
  border-radius: 12px;
  border: 1px solid #222;
}

.dashboard { display: none; }

nav {
  background: #111;
  padding: 10px;
  display: flex;
  gap: 10px;
  overflow-x: auto;
}

nav button {
  background: #1c1c1c;
  border: none;
  color: white;
  padding: 10px;
  border-radius: 8px;
  cursor: pointer;
}

.module { display: none; }
.active { display: block; }

.alert {
  background: #ff3b3b;
  padding: 10px;
  border-radius: 8px;
  margin-bottom: 10px;
}
</style>
</head>

<body>

<header>
  <h1>Sistema Boliche PRO</h1>
  <button class="btn" onclick="entrar()">Entrar</button>
</header>

<div class="dashboard">

<nav>
  <button onclick="show('inicio')">Dashboard</button>
  <button onclick="show('caja')">Caja</button>
  <button onclick="show('vip')">VIP</button>
  <button onclick="show('stock')">Stock</button>
  <button onclick="show('rrpp')">RRPP</button>
</nav>

<div class="container">

<div id="alertas"></div>

<!-- DASHBOARD -->
<div id="inicio" class="module active">
  <h2>Dashboard</h2>
  <div class="grid">
    <div class="card">💰 Ingresos: $<span id="totalVentas">0</span></div>
    <div class="card">💸 Gastos: $<span id="totalGastos">0</span></div>
    <div class="card">📈 Ganancia: $<span id="ganancia">0</span></div>
    <div class="card">🍾 VIP: <span id="vipActivos">0</span></div>
  </div>

  <canvas id="grafico"></canvas>
</div>

<!-- CAJA -->
<div id="caja" class="module">
  <h2>Caja</h2>

  <h3>Ingresos</h3>
  <input id="monto" placeholder="Monto ingreso">
  <button class="btn" onclick="sumarCaja()">Agregar ingreso</button>

  <h3>Gastos</h3>
  <input id="gasto" placeholder="Monto gasto">
  <button class="btn" onclick="sumarGasto()">Agregar gasto</button>

  <button class="btn" onclick="cerrarCaja()">Cerrar caja</button>

  <p>Ingresos: $<span id="cajaTotal">0</span></p>
  <p>Gastos: $<span id="gastosTotal">0</span></p>
</div>

<!-- VIP -->
<div id="vip" class="module">
  <h2>Mesas VIP</h2>
  <button class="btn" onclick="agregarVIP()">Agregar Mesa</button>
  <ul id="listaVIP"></ul>
</div>

<!-- STOCK -->
<div id="stock" class="module">
  <h2>Stock</h2>
  <button class="btn" onclick="usarFernet()">Vender Fernet</button>
  <p>Fernet: <span id="fernetStock">10</span></p>
</div>

<!-- RRPP -->
<div id="rrpp" class="module">
  <h2>RRPP</h2>
  <button class="btn" onclick="sumarRRPP()">+1 ingreso</button>
  <p>Total ingresos: <span id="rrppTotal">0</span></p>
</div>

</div>
</div>

<script>

// ESTADO
let caja = 0;
let gastos = 0;
let rrpp = 0;
let stockFernet = 10;
let vipMesas = [];

let chart;

// UI
function entrar(){
  document.querySelector('.dashboard').style.display='block';
}

function show(id){
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// CAJA
async function sumarCaja(){
  let val = parseInt(monto.value) || 0;

  await addDoc(collection(db, "movimientos"), {
    tipo: "ingreso",
    monto: val,
    fecha: new Date()
  });

  cargarDatos();
}

async function sumarGasto(){
  let val = parseInt(gasto.value) || 0;

  await addDoc(collection(db, "movimientos"), {
    tipo: "gasto",
    monto: val,
    fecha: new Date()
  });

  cargarDatos();
  
}

function cerrarCaja(){
  alert("Ganancia final: $" + (caja - gastos));
  caja = 0;
  gastos = 0;
  update();
}
  async function cargarDatos(){
  const querySnapshot = await getDocs(collection(db, "movimientos"));

  let ingresos = 0;
  let gastos = 0;

  querySnapshot.forEach(doc => {
    let data = doc.data();

    if(data.tipo === "ingreso") ingresos += data.monto;
    if(data.tipo === "gasto") gastos += data.monto;
  });

  caja = ingresos;
  gastosTotal = gastos;

  update();
}

// VIP
function agregarVIP(){
  vipMesas.push(0);
  renderVIP();
}

function consumirVIP(i){
  vipMesas[i] += 5000;
  update();
  renderVIP();
}

function cerrarVIP(i){
  caja += vipMesas[i];
  vipMesas.splice(i,1);
  renderVIP();
  update();
}

function renderVIP(){
  listaVIP.innerHTML = vipMesas.map((v,i)=>`
    <li>Mesa ${i+1} - $${v}
    <button onclick="consumirVIP(${i})">+</button>
    <button onclick="cerrarVIP(${i})">✔</button>
    </li>
  `).join("");
}

// STOCK
function usarFernet(){
  stockFernet--;
  update();
}

// RRPP
function sumarRRPP(){
  rrpp++;
  update();
}

// ALERTAS
function checkAlertas(){
  alertas.innerHTML = stockFernet <= 3 
    ? "<div class='alert'>⚠️ Stock bajo</div>" 
    : "";
}

// GRÁFICO
function renderChart(){
  const ctx = document.getElementById('grafico');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Ingresos', 'Gastos', 'Ganancia'],
      datasets: [{
        label: 'Resumen',
        data: [caja, gastos, caja - gastos]
      }]
    }
  });
}
  import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword } 
from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";

const auth = getAuth();

function registrar(){
  createUserWithEmailAndPassword(auth, email.value, password.value)
}
  function login(){
  signInWithEmailAndPassword(auth, email.value, password.value)
  .then(()=>{
    entrar();
  });
}

// UPDATE
function update(){
  cajaTotal.innerText = caja;
  gastosTotal.innerText = gastos;
  totalVentas.innerText = caja;
  totalGastos.innerText = gastos;
  ganancia.innerText = caja - gastos;
  vipActivos.innerText = vipMesas.length;
  fernetStock.innerText = stockFernet;
  rrppTotal.innerText = rrpp;

  checkAlertas();
  renderChart();
}

update();

</script>

</body>
