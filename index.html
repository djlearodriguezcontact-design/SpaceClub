<!DOCTYPE html>
<html>
<head>
  <title>Space Club </title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: #020617;
      color: white;
    }

    .container {
      padding: 20px;
    }

    input {
      display: block;
      margin: 5px 0;
      padding: 8px;
      width: 100%;
    }

    button {
      padding: 10px;
      margin: 5px 0;
      background: #22c55e;
      border: none;
      width: 100%;
      cursor: pointer;
    }

    li {
      border-bottom: 1px solid #1e293b;
      padding: 5px;
    }
  </style>
</head>

<body>

<div class="container" id="app"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, doc, setDoc, getDoc, collection, addDoc, getDocs, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

const firebaseConfig = {
  apiKey: "TU_API_KEY",
  authDomain: "TU_DOMINIO",
  projectId: "TU_PROJECT_ID"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

let userData = null;

// ================= LOGIN =================
function renderLogin() {
  app.innerHTML = `
    <h2>Login</h2>
    <input id="email" placeholder="Email">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Ingresar</button>
  `;
}

window.login = async function() {
  await signInWithEmailAndPassword(
    auth,
    email.value,
    password.value
  );
};

// ================= ADMIN =================

window.crearRRPP = async function() {
  const cred = await createUserWithEmailAndPassword(
    auth,
    newEmail.value,
    newPass.value
  );

  await setDoc(doc(db, "usuarios", cred.user.uid), {
    rol: "rrpp",
    nombre: nombreRRPP.value
  });

  alert("RRPP creado");
};

window.setComision = async function() {
  await setDoc(doc(db, "comisiones", rrppNombre.value), {
    comision: Number(comision.value)
  });

  alert("Comisión guardada");
};

window.guardarHora = async function() {
  await setDoc(doc(db, "config", "horario"), {
    horaLimite: horaLimite.value
  });

  alert("Horario guardado");
};

// ================= RRPP =================

async function listaCerrada() {
  const snap = await getDoc(doc(db, "config", "horario"));
  if (!snap.exists()) return false;

  const [h, m] = snap.data().horaLimite.split(":");

  const limite = new Date();
  limite.setHours(h, m, 0);

  return new Date() > limite;
}

window.addVenta = async function() {
  await addDoc(collection(db, "ventas"), {
    rrpp: userData.nombre,
    cantidad: Number(cantidad.value),
    precio: Number(precio.value)
  });
};

window.addInvitado = async function() {
  if (await listaCerrada()) {
    alert("Lista cerrada");
    return;
  }

  await addDoc(collection(db, "invitados"), {
    rrpp: userData.nombre,
    nombre: nombreInv.value,
    dni: dni.value,
    asistio: false
  });
};

// ================= ADMIN PANEL =================

async function renderAdmin() {

  const ventasSnap = await getDocs(collection(db, "ventas"));
  const ventas = ventasSnap.docs.map(d=>d.data());

  const comSnap = await getDocs(collection(db, "comisiones"));
  const comisiones = {};
  comSnap.docs.forEach(d=>{
    comisiones[d.id] = d.data().comision;
  });

  let ingresos = 0;
  const ranking = {};
  const pagos = {};

  ventas.forEach(v=>{
    ingresos += v.cantidad * v.precio;

    ranking[v.rrpp] = (ranking[v.rrpp] || 0) + v.cantidad;

    const com = comisiones[v.rrpp] || 0;
    pagos[v.rrpp] = (pagos[v.rrpp] || 0) + v.cantidad * com;
  });

  const invitadosSnap = await getDocs(collection(db, "invitados"));
  const invitados = invitadosSnap.docs.map(d=>({id:d.id,...d.data()}));

  app.innerHTML = `
    <h1>ADMIN PANEL</h1>

    <h2>Ingresos: $${ingresos}</h2>
    <h2>Pagos RRPP: $${Object.values(pagos).reduce((a,b)=>a+b,0)}</h2>

    <h3>Crear RRPP</h3>
    <input id="nombreRRPP" placeholder="Nombre">
    <input id="newEmail" placeholder="Email">
    <input id="newPass" placeholder="Password">
    <button onclick="crearRRPP()">Crear</button>

    <h3>Comisiones</h3>
    <input id="rrppNombre" placeholder="RRPP">
    <input id="comision" placeholder="Comisión">
    <button onclick="setComision()">Guardar</button>

    <h3>Horario límite lista</h3>
    <input id="horaLimite" type="time">
    <button onclick="guardarHora()">Guardar</button>

    <h3>Control de puerta</h3>
    <ul>
      ${invitados.map(i=>`
        <li>
          ${i.nombre} - ${i.dni} - ${i.rrpp}
          <button onclick="toggleAsistencia('${i.id}', ${i.asistio})">
            ${i.asistio ? "✔" : "❌"}
          </button>
        </li>
      `).join("")}
    </ul>
  `;
}

// 👉 marcar asistencia
window.toggleAsistencia = async function(id, estado) {
  await updateDoc(doc(db, "invitados", id), {
    asistio: !estado
  });
  renderAdmin();
};

// ================= RRPP PANEL =================

async function renderRRPP() {

  const cerrada = await listaCerrada();

  app.innerHTML = `
    <h1>Panel RRPP</h1>

    ${cerrada ? "<h2 style='color:red'>LISTA CERRADA</h2>" : ""}

    <input id="cantidad" placeholder="Cantidad">
    <input id="precio" placeholder="Precio">
    <button onclick="addVenta()">Cargar venta</button>

    <h3>Invitados</h3>
    <input id="nombreInv" placeholder="Nombre">
    <input id="dni" placeholder="DNI">

    <button onclick="addInvitado()" ${cerrada ? "disabled" : ""}>
      Agregar invitado
    </button>
  `;
}

// ================= AUTH =================

onAuthStateChanged(auth, async (user) => {

  if (!user) return renderLogin();

  const docSnap = await getDoc(doc(db, "usuarios", user.uid));
  userData = docSnap.data();

  if (userData.rol === "admin") {
    renderAdmin();
  } else {
    renderRRPP();
  }

});
</script>

</body>
</html>
