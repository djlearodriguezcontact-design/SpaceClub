<!DOCTYPE html>
<html>
<head>
  <title>Space Club Admin</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: linear-gradient(135deg, #020617, #0f172a);
      color: white;
    }

    h1 {
      text-align: center;
      padding: 20px;
    }

    .container {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 20px;
      padding: 20px;
    }

    .card {
      background: rgba(30, 41, 59, 0.8);
      border-radius: 12px;
      padding: 15px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }

    input, select {
      width: 100%;
      padding: 8px;
      margin: 5px 0;
      border-radius: 6px;
      border: none;
    }

    button {
      width: 100%;
      padding: 10px;
      margin-top: 5px;
      background: #22c55e;
      border: none;
      border-radius: 6px;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    button:hover {
      background: #16a34a;
    }

    .stats {
      display: flex;
      justify-content: space-between;
      margin-top: 10px;
    }

    .stat {
      background: #020617;
      padding: 10px;
      border-radius: 8px;
      text-align: center;
      flex: 1;
      margin: 5px;
    }

    ul {
      padding: 0;
      list-style: none;
    }

    li {
      padding: 5px;
      border-bottom: 1px solid #334155;
    }
  </style>
</head>

<body>

<h1>🎧 SPACE CLUB ADMIN</h1>

<div class="container">

  <!-- RRPP -->
  <div class="card">
    <h2>RRPP</h2>
    <input id="rrppNombre" placeholder="Nombre RRPP">
    <button onclick="addRRPP()">Agregar</button>
  </div>

  <!-- Ventas -->
  <div class="card">
    <h2>Ventas</h2>
    <select id="rrppSelect"></select>
    <input id="cantidad" placeholder="Cantidad">
    <input id="precio" placeholder="Precio">
    <button onclick="addVenta()">Registrar</button>
  </div>

  <!-- Gastos -->
  <div class="card">
    <h2>Gastos</h2>
    <input id="concepto" placeholder="Concepto">
    <input id="monto" placeholder="Monto">
    <button onclick="addGasto()">Agregar</button>
  </div>

  <!-- Caja -->
  <div class="card">
    <h2>Caja</h2>
    <div class="stats">
      <div class="stat">
        <p>Ingresos</p>
        <h3 id="ingresos">$0</h3>
      </div>
      <div class="stat">
        <p>Gastos</p>
        <h3 id="gastos">$0</h3>
      </div>
      <div class="stat">
        <p>Ganancia</p>
        <h3 id="ganancia">$0</h3>
      </div>
    </div>
  </div>

  <!-- Ranking -->
  <div class="card">
    <h2>Ranking RRPP</h2>
    <ul id="ranking"></ul>
  </div>

  <!-- Gráfico -->
  <div class="card">
    <h2>Gráfico</h2>
    <canvas id="grafico"></canvas>
  </div>

</div>

<script>
let rrpps = [];
let ventas = [];
let gastos = [];
let chart;

function addRRPP() {
  const nombre = document.getElementById("rrppNombre").value;
  if (!nombre) return;

  rrpps.push({ id: Date.now(), nombre });
  updateRRPP();
}

function updateRRPP() {
  const select = document.getElementById("rrppSelect");
  select.innerHTML = "";
  rrpps.forEach(r => {
    const option = document.createElement("option");
    option.value = r.id;
    option.text = r.nombre;
    select.appendChild(option);
  });
}

function addVenta() {
  const rrppId = document.getElementById("rrppSelect").value;
  const cantidad = Number(document.getElementById("cantidad").value);
  const precio = Number(document.getElementById("precio").value);

  ventas.push({ rrppId, cantidad, precio });
  updateDashboard();
}

function addGasto() {
  const concepto = document.getElementById("concepto").value;
  const monto = Number(document.getElementById("monto").value);

  gastos.push({ concepto, monto });
  updateDashboard();
}

function updateDashboard() {
  const ingresos = ventas.reduce((a,v)=>a+v.cantidad*v.precio,0);
  const egresos = gastos.reduce((a,g)=>a+g.monto,0);
  const ganancia = ingresos - egresos;

  document.getElementById("ingresos").innerText = "$" + ingresos;
  document.getElementById("gastos").innerText = "$" + egresos;
  document.getElementById("ganancia").innerText = "$" + ganancia;

  const ranking = rrpps.map(r => {
    const total = ventas
      .filter(v => v.rrppId == r.id)
      .reduce((a,v)=>a+v.cantidad,0);
    return { nombre: r.nombre, ventas: total };
  }).sort((a,b)=>b.ventas-a.ventas);

  const ul = document.getElementById("ranking");
  ul.innerHTML = "";
  ranking.forEach((r,i) => {
    const li = document.createElement("li");
    li.innerText = (i+1) + ". " + r.nombre + " - " + r.ventas;
    ul.appendChild(li);
  });

  const ctx = document.getElementById("grafico");

  if (chart) chart.destroy();

  chart = new Chart(ctx, {
    type: "bar",
    data: {
      labels: ranking.map(r=>r.nombre),
      datasets: [{
        label: "Ventas",
        data: ranking.map(r=>r.ventas)
      }]
    }
  });
}
</script>

</body>
</html>
