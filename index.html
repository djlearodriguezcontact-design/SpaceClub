<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getFirestore, collection, addDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

// CONFIG
const firebaseConfig = {
  apiKey: "AIzaSyApCGqlcCCEOggTrLBhG-sobbsssK9MRUQ",
  authDomain: "boliche-pro.firebaseapp.com",
  projectId: "boliche-pro",
};

// INIT
const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const auth = getAuth(app);

// ESTADO
let caja = 0;
let gastos = 0;
let rrpp = 0;
let stockFernet = 10;
let vipMesas = [];
let chart;

// HACER FUNCIONES GLOBALES
window.entrar = function(){
  document.querySelector('.dashboard').style.display='block';
}

window.show = function(id){
  document.querySelectorAll('.module').forEach(m=>m.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// CAJA FIREBASE
window.sumarCaja = async function(){
  let val = parseInt(document.getElementById('monto').value) || 0;

  await addDoc(collection(db, "movimientos"), {
    tipo: "ingreso",
    monto: val,
    fecha: new Date()
  });

  cargarDatos();
}

window.sumarGasto = async function(){
  let val = parseInt(document.getElementById('gasto').value) || 0;

  await addDoc(collection(db, "movimientos"), {
    tipo: "gasto",
    monto: val,
    fecha: new Date()
  });

  cargarDatos();
}

// LEER DATOS
async function cargarDatos(){
  const querySnapshot = await getDocs(collection(db, "movimientos"));

  let ingresos = 0;
  let totalGastos = 0;

  querySnapshot.forEach(doc => {
    let data = doc.data();

    if(data.tipo === "ingreso") ingresos += data.monto;
    if(data.tipo === "gasto") totalGastos += data.monto;
  });

  caja = ingresos;
  gastos = totalGastos;

  update();
}

// VIP
window.agregarVIP = function(){
  vipMesas.push(0);
  renderVIP();
}

window.consumirVIP = function(i){
  vipMesas[i] += 5000;
  update();
  renderVIP();
}

window.cerrarVIP = function(i){
  caja += vipMesas[i];
  vipMesas.splice(i,1);
  renderVIP();
  update();
}

function renderVIP(){
  document.getElementById("listaVIP").innerHTML = vipMesas.map((v,i)=>`
    <li>Mesa ${i+1} - $${v}
    <button onclick="consumirVIP(${i})">+</button>
    <button onclick="cerrarVIP(${i})">✔</button>
    </li>
  `).join("");
}

// STOCK
window.usarFernet = function(){
  stockFernet--;
  update();
}

// RRPP
window.sumarRRPP = function(){
  rrpp++;
  update();
}

// ALERTAS
function checkAlertas(){
  document.getElementById("alertas").innerHTML = stockFernet <= 3 
    ? "<div class='alert'>⚠️ Stock bajo</div>" 
    : "";
}

// GRÁFICO
function renderChart(){
  const ctx = document.getElementById('grafico');

  if(chart) chart.destroy();

  chart = new Chart(ctx, {
    type: 'bar',
    data: {
      labels: ['Ingresos', 'Gastos', 'Ganancia'],
      datasets: [{
        data: [caja, gastos, caja - gastos]
      }]
    }
  });
}

// UPDATE
function update(){
  document.getElementById("cajaTotal").innerText = caja;
  document.getElementById("gastosTotal").innerText = gastos;
  document.getElementById("totalVentas").innerText = caja;
  document.getElementById("totalGastos").innerText = gastos;
  document.getElementById("ganancia").innerText = caja - gastos;
  document.getElementById("vipActivos").innerText = vipMesas.length;
  document.getElementById("fernetStock").innerText = stockFernet;
  document.getElementById("rrppTotal").innerText = rrpp;

  checkAlertas();
  renderChart();
}

// INIT
cargarDatos();

</script>
